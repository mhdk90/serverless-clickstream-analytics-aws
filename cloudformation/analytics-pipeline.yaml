AWSTemplateFormatVersion: '2010-09-09'
Description: Serverless clickstream analytics pipeline with Firehose, S3, and Athena

Parameters:
  ProjectName:
    Type: String
    Default: clickstream-analytics

  FirehoseStreamName:
    Type: String
    Default: clickstream-delivery-stream
    Description: Name of the Firehose delivery stream

  AthenaWorkGroupName:
    Type: String
    Default: clickstream-analytics-wg
    Description: Name of the Athena workgroup

  RawEventsPrefix:
    Type: String
    Default: raw/
    Description: Prefix for raw clickstream data in the raw events bucket

  FirehoseErrorPrefix:
    Type: String
    Default: errors/
    Description: Prefix for Firehose delivery errors in the raw events bucket

  AthenaResultsPrefix:
    Type: String
    Default: athena-results/
    Description: Prefix for Athena query results in the analytics results bucket

Resources:
  RawEventsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-raw-events'
        - Key: Purpose
          Value: clickstream-raw
        - Key: ManagedBy
          Value: CloudFormation

  AnalyticsResultsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: expire-old-athena-results
            Status: Enabled
            ExpirationInDays: 30
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-analytics-results'
        - Key: Purpose
          Value: analytics-results
        - Key: ManagedBy
          Value: CloudFormation

  FirehoseDeliveryRole:
    Type: AWS::IAM::Role
    Properties:
      Description: IAM role used by Firehose to deliver clickstream data to S3
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: firehose-s3-delivery
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: S3Access
                Effect: Allow
                Action:
                  - s3:AbortMultipartUpload
                  - s3:GetBucketLocation
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:ListBucketMultipartUploads
                  - s3:PutObject
                Resource:
                  - !GetAtt RawEventsBucket.Arn
                  - !Sub '${RawEventsBucket.Arn}/*'
              - Sid: CWLogsAccess
                Effect: Allow
                Action:
                  - logs:PutLogEvents
                Resource: '*'
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-firehose-role'
        - Key: Purpose
          Value: firehose-delivery
        - Key: ManagedBy
          Value: CloudFormation

  ClickstreamDeliveryStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamName: !Ref FirehoseStreamName
      DeliveryStreamType: DirectPut
      S3DestinationConfiguration:
        BucketARN: !GetAtt RawEventsBucket.Arn
        RoleARN: !GetAtt FirehoseDeliveryRole.Arn
        Prefix: !Sub '${RawEventsPrefix}year=!{timestamp:yyyy}/month=!{timestamp:MM}/day=!{timestamp:dd}/'
        ErrorOutputPrefix: !Sub '${FirehoseErrorPrefix}!{firehose:error-output-type}/year=!{timestamp:yyyy}/month=!{timestamp:MM}/day=!{timestamp:dd}/'
        BufferingHints:
          IntervalInSeconds: 60
          SizeInMBs: 5
        CompressionFormat: GZIP
        CloudWatchLoggingOptions:
          Enabled: true
          LogGroupName: !Sub '/aws/kinesisfirehose/${ProjectName}'
          LogStreamName: s3-delivery
      Tags:
        - Key: Name
          Value: !Ref FirehoseStreamName
        - Key: Purpose
          Value: clickstream-ingestion
        - Key: ManagedBy
          Value: CloudFormation

  AthenaWorkGroup:
    Type: AWS::Athena::WorkGroup
    Properties:
      Name: !Ref AthenaWorkGroupName
      Description: Athena workgroup for clickstream analytics
      State: ENABLED
      Tags:
        - Key: Name
          Value: !Ref AthenaWorkGroupName
        - Key: Purpose
          Value: clickstream-query
        - Key: ManagedBy
          Value: CloudFormation
      WorkGroupConfiguration:
        EnforceWorkGroupConfiguration: true
        PublishCloudWatchMetricsEnabled: true
        ResultConfiguration:
          OutputLocation: !Sub 's3://${AnalyticsResultsBucket}/${AthenaResultsPrefix}'
          EncryptionConfiguration:
            EncryptionOption: SSE_S3

Outputs:
  RawEventsBucketName:
    Description: S3 bucket storing raw clickstream events
    Value: !Ref RawEventsBucket

  AnalyticsResultsBucketName:
    Description: S3 bucket storing Athena query results
    Value: !Ref AnalyticsResultsBucket

  DeliveryStreamName:
    Description: Firehose delivery stream name
    Value: !Ref ClickstreamDeliveryStream

  AthenaWorkGroupName:
    Description: Athena workgroup name
    Value: !Ref AthenaWorkGroup
