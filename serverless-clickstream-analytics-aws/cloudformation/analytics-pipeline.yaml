AWSTemplateFormatVersion: '2010-09-09'
Description: Serverless clickstream analytics starter with Firehose, S3, and Athena

Parameters:
  ProjectName:
    Type: String
    Default: clickstream-analytics

Resources:
  RawEventsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-raw-events'
        - Key: Purpose
          Value: clickstream-raw

  AnalyticsResultsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: expire-old-athena-results
            Status: Enabled
            ExpirationInDays: 30
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-analytics-results'
        - Key: Purpose
          Value: analytics-results

  FirehoseDeliveryRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-firehose-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: firehose-s3-delivery
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: S3Access
                Effect: Allow
                Action:
                  - s3:AbortMultipartUpload
                  - s3:GetBucketLocation
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:ListBucketMultipartUploads
                  - s3:PutObject
                Resource:
                  - !GetAtt RawEventsBucket.Arn
                  - !Sub '${RawEventsBucket.Arn}/*'
              - Sid: CWLogsAccess
                Effect: Allow
                Action:
                  - logs:PutLogEvents
                Resource: '*'

  ClickstreamDeliveryStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamName: !Sub '${ProjectName}-delivery-stream'
      DeliveryStreamType: DirectPut
      S3DestinationConfiguration:
        BucketARN: !GetAtt RawEventsBucket.Arn
        RoleARN: !GetAtt FirehoseDeliveryRole.Arn
        Prefix: raw/year=!{timestamp:yyyy}/month=!{timestamp:MM}/day=!{timestamp:dd}/
        ErrorOutputPrefix: errors/!{firehose:error-output-type}/year=!{timestamp:yyyy}/month=!{timestamp:MM}/day=!{timestamp:dd}/
        BufferingHints:
          IntervalInSeconds: 60
          SizeInMBs: 5
        CompressionFormat: GZIP
        CloudWatchLoggingOptions:
          Enabled: true
          LogGroupName: !Sub '/aws/kinesisfirehose/${ProjectName}'
          LogStreamName: s3-delivery

  AthenaWorkGroup:
    Type: AWS::Athena::WorkGroup
    Properties:
      Name: !Sub '${ProjectName}-wg'
      Description: Athena workgroup for clickstream analytics
      State: ENABLED
      WorkGroupConfiguration:
        EnforceWorkGroupConfiguration: true
        PublishCloudWatchMetricsEnabled: true
        ResultConfiguration:
          OutputLocation: !Sub 's3://${AnalyticsResultsBucket}/athena-results/'
          EncryptionConfiguration:
            EncryptionOption: SSE_S3

Outputs:
  RawEventsBucketName:
    Description: S3 bucket storing raw clickstream events
    Value: !Ref RawEventsBucket

  AnalyticsResultsBucketName:
    Description: S3 bucket storing Athena query results
    Value: !Ref AnalyticsResultsBucket

  DeliveryStreamName:
    Description: Firehose delivery stream name
    Value: !Ref ClickstreamDeliveryStream

  AthenaWorkGroupName:
    Description: Athena workgroup name
    Value: !Ref AthenaWorkGroup